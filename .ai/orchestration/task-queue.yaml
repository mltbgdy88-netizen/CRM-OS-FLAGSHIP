# CRM OS Agent Task Queue
# Source Status: SPRINT_02_ORCHESTRATION_ACTIVE_v1.1

sprint_01:
  status: completed
  verify_command: pnpm sprint:01:verify
  integration_branch: main
  notes: Bootstrap merged; CI green on CRM-OS-FLAGSHIP

sprint_02:
  status: orchestration_active
  phase: "0.2"
  integration_branch: agent/sprint-02-auth-tenant-iam
  target_main: main
  frontend_slice_b: disabled_until_backend_rls_proof
  queue_runtime: redis_bullmq
  rabbitmq: deferred

  iam_data_ownership:
    users: global_identity
    tenants: tenant_business_account
    tenant_members: user_to_tenant_membership
    roles: tenant_owned
    permissions: global_registry
    role_permissions: mapping
    member_roles: mapping
    audit_logs: tenant_owned
    sessions: user_owned_with_active_tenant_context
    devices: user_owned_with_active_tenant_context

tasks:
