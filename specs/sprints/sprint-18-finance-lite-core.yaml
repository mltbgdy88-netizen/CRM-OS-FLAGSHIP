sprint: 18
name: "Finance Lite Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Finance Lite Core as a production-ready CRM OS module slice."
domain: "Finance"
module: "finance"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - accounts
  - account_transactions
  - credit_limits
  - risk_limits
  - invoices
  - invoice_items
permissions:
  - finance.read
  - account.read
  - invoice.create
events:
  - InvoiceCreated
  - BalanceUpdated
api:
  - "GET /accounts"
  - "GET /account-transactions"
  - "POST /invoices"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
