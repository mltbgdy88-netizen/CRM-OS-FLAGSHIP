sprint: 25
name: "Dealer Portal Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Dealer Portal Core as a production-ready CRM OS module slice."
domain: "Dealer"
module: "dealer"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - dealers
  - dealer_users
  - dealer_catalogs
  - dealer_product_visibility
  - dealer_price_rules
permissions:
  - dealer.read
  - dealer.manage
  - dealer.portal.access
events:
  - DealerCreated
  - DealerUserInvited
api:
  - "GET /dealers"
  - "POST /dealers"
  - "GET /dealer-portal/catalog"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
