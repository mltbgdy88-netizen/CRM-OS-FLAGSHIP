sprint: 38
name: "Dashboard Builder"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Dashboard Builder as a production-ready CRM OS module slice."
domain: "Reporting"
module: "reporting"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - dashboards
  - dashboard_widgets
  - dashboard_filters
  - dashboard_permissions
permissions:
  - dashboard.manage
  - dashboard.read
events:
  - DashboardCreated
  - DashboardUpdated
api:
  - "GET /dashboards"
  - "POST /dashboards"
  - "PATCH /dashboards/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
