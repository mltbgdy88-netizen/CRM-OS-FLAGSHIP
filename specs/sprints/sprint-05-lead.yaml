sprint: 5
name: "Lead"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Lead as a production-ready CRM OS module slice."
domain: "Lead"
module: "lead"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - leads
  - lead_sources
  - lead_tags
  - lead_scores
  - lead_assignments
  - lead_activities
permissions:
  - lead.read
  - lead.create
  - lead.assign
  - lead.update
events:
  - LeadCreated
  - LeadAssigned
  - LeadQualified
  - LeadLost
api:
  - "GET /leads"
  - "POST /leads"
  - "PATCH /leads/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
