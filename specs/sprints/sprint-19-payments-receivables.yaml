sprint: 19
name: "Payments & Receivables"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Payments & Receivables as a production-ready CRM OS module slice."
domain: "Finance"
module: "finance"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - payments
  - payment_methods
  - installments
  - bank_accounts
  - bank_transactions
permissions:
  - payment.read
  - payment.create
  - receivable.read
events:
  - PaymentCreated
  - PaymentReceived
  - PaymentOverdue
api:
  - "POST /payments"
  - "GET /receivables"
  - "GET /payments"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
