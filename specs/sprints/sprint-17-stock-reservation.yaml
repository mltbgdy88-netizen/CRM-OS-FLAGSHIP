sprint: 17
name: "Stock Reservation"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Stock Reservation as a production-ready CRM OS module slice."
domain: "Inventory"
module: "inventory"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - stock_reservations
  - order_reservations
  - stocks
  - stock_movements
permissions:
  - inventory.reserve
  - inventory.release
events:
  - StockReserved
  - StockReleased
api:
  - "POST /orders/{id}/reserve-stock"
  - "POST /stock-reservations/{id}/release"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
