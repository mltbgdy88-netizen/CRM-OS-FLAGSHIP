sprint: 11
name: "Task & Activity"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Task & Activity as a production-ready CRM OS module slice."
domain: "Task"
module: "task"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - tasks
  - task_assignees
  - task_comments
  - task_files
  - task_reminders
  - activities
permissions:
  - task.read
  - task.create
  - activity.create
events:
  - TaskCreated
  - TaskCompleted
  - ActivityLogged
api:
  - "GET /tasks"
  - "POST /tasks"
  - "POST /activities"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
