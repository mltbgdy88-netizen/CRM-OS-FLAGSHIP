sprint: 7
name: "Opportunity Management"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Opportunity Management as a production-ready CRM OS module slice."
domain: "Sales"
module: "sales"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - opportunities
  - opportunity_products
  - opportunity_contacts
  - opportunity_activities
  - opportunity_notes
permissions:
  - opportunity.read
  - opportunity.create
  - opportunity.update
events:
  - OpportunityCreated
  - OpportunityStageChanged
  - OpportunityWon
  - OpportunityLost
api:
  - "GET /opportunities"
  - "POST /opportunities"
  - "PATCH /opportunities/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
