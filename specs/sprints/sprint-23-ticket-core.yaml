sprint: 23
name: "Ticket Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Ticket Core as a production-ready CRM OS module slice."
domain: "Support"
module: "support"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - tickets
  - ticket_categories
  - ticket_priorities
  - ticket_statuses
  - ticket_messages
  - ticket_files
permissions:
  - ticket.read
  - ticket.create
  - ticket.update
events:
  - TicketCreated
  - TicketAssigned
api:
  - "GET /tickets"
  - "POST /tickets"
  - "GET /tickets/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
