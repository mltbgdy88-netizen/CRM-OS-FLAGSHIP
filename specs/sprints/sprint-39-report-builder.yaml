sprint: 39
name: "Report Builder"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Report Builder as a production-ready CRM OS module slice."
domain: "Reporting"
module: "reporting"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - reports
  - report_columns
  - report_filters
  - report_schedules
  - report_exports
permissions:
  - report.manage
  - report.read
  - report.export
events:
  - ReportCreated
  - ReportScheduled
  - ReportExported
api:
  - "GET /reports"
  - "POST /reports"
  - "POST /reports/{id}/run"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
