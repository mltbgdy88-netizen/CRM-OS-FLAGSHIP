sprint: 24
name: "SLA & Support Management"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement SLA & Support Management as a production-ready CRM OS module slice."
domain: "Support"
module: "support"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - ticket_sla_rules
  - ticket_sla_logs
  - ticket_satisfaction_surveys
  - knowledge_base_articles
permissions:
  - sla.manage
  - ticket.resolve
  - knowledge.manage
events:
  - TicketResolved
  - TicketClosed
  - SLABreached
api:
  - "GET /sla"
  - "POST /tickets/{id}/resolve"
  - "GET /knowledge-base"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
