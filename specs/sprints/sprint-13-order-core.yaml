sprint: 13
name: "Order Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Order Core as a production-ready CRM OS module slice."
domain: "Order"
module: "order"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - orders
  - order_items
  - order_status_history
permissions:
  - order.read
  - order.create
  - order.update
events:
  - OrderCreated
  - OrderConfirmed
api:
  - "GET /orders"
  - "POST /orders"
  - "GET /orders/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
