sprint: 37
name: "Analytics Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Analytics Core as a production-ready CRM OS module slice."
domain: "Reporting"
module: "reporting"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - metrics
  - metric_snapshots
  - kpi_targets
  - reports
  - report_exports
permissions:
  - analytics.read
  - report.export
events:
  - ReportGenerated
  - MetricSnapshotCreated
api:
  - "GET /analytics"
  - "GET /metrics"
  - "POST /reports/export"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
