sprint: 34
name: "Ask CRM"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Ask CRM as a production-ready CRM OS module slice."
domain: "AI"
module: "ai"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - ai_conversations
  - ai_conversation_messages
  - ai_documents
  - ai_embeddings
permissions:
  - ai.ask
  - search.read
events:
  - AIActionRequested
  - AIActionCompleted
api:
  - "POST /ask-crm"
  - "GET /ask-crm/conversations"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
