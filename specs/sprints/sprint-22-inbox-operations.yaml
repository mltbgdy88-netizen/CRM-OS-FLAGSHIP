sprint: 22
name: "Inbox Operations"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Inbox Operations as a production-ready CRM OS module slice."
domain: "Communication"
module: "communication"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - conversation_assignments
  - conversation_tags
  - conversation_status_history
  - message_attachments
permissions:
  - inbox.read
  - conversation.assign
  - conversation.resolve
events:
  - ConversationAssigned
  - MessageReceived
api:
  - "GET /inbox"
  - "PATCH /conversations/{id}/assign"
  - "PATCH /conversations/{id}/status"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
