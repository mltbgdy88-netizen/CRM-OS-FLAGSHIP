sprint: 9
name: "Quote Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Quote Core as a production-ready CRM OS module slice."
domain: "Quote"
module: "quote"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - quotes
  - quote_versions
  - quote_items
  - quote_discounts
  - quote_taxes
permissions:
  - quote.read
  - quote.create
  - quote.update
events:
  - QuoteCreated
api:
  - "GET /quotes"
  - "POST /quotes"
  - "GET /quotes/{id}"
  - "PATCH /quotes/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
