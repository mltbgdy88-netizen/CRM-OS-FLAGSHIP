sprint: 26
name: "Dealer Orders"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Dealer Orders as a production-ready CRM OS module slice."
domain: "Dealer/Order"
module: "dealer"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - dealer_orders
  - dealer_order_items
  - dealer_balances
  - dealer_targets
  - dealer_commissions
permissions:
  - dealer.order.create
  - dealer.order.read
events:
  - DealerOrderCreated
  - OrderCreated
api:
  - "GET /dealer-orders"
  - "POST /dealer-orders"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
