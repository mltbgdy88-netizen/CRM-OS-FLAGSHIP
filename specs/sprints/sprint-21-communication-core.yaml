sprint: 21
name: "Communication Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Communication Core as a production-ready CRM OS module slice."
domain: "Communication"
module: "communication"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - channels
  - channel_accounts
  - conversations
  - conversation_participants
  - messages
permissions:
  - conversation.read
  - message.send
  - channel.manage
events:
  - MessageReceived
  - MessageSent
api:
  - "GET /conversations"
  - "POST /messages"
  - "GET /channels"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
