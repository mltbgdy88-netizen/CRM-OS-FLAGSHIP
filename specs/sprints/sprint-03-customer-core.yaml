sprint: 3
name: "Customer Core"
source_status: FROM_RECONSTRUCTED_CONTENT
objective: "Implement Customer Core as a production-ready CRM OS module slice."
domain: "CRM"
module: "crm"
architecture:
  backend: "NestJS modular monolith"
  frontend: "Next.js App Router"
  database: "PostgreSQL with tenant_id and RLS"
  events: "Domain events with audit trace"
entities:
  - customers
  - customer_contacts
  - customer_addresses
  - customer_tags
  - customer_notes
  - customer_files
permissions:
  - customer.read
  - customer.create
  - customer.update
  - customer.delete
events:
  - CustomerCreated
  - CustomerUpdated
api:
  - "GET /customers"
  - "POST /customers"
  - "GET /customers/{id}"
  - "PATCH /customers/{id}"
ui:
  requires_app_shell: true
  requires_loading_state: true
  requires_empty_state: true
  requires_error_state: true
  requires_permission_state: true
tests:
  - unit
  - integration
  - rls
  - permission_guard
  - api_contract
  - frontend_states
definition_of_done:
  - backend_complete
  - frontend_complete_when_applicable
  - migration_complete
  - rls_policy_complete
  - permissions_registered
  - events_registered
  - tests_pass
  - documentation_updated
