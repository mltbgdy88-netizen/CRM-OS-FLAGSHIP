  - id: sprint-01-repo-bootstrap
    sprint: 1
    module: foundation
    agent: devops
    branch: main
    status: completed

  - id: sprint-01-api-skeleton
    sprint: 1
    module: api
    agent: backend
    branch: main
    depends_on:
      - sprint-01-repo-bootstrap
    status: completed

  - id: sprint-01-web-skeleton
    sprint: 1
    module: web
    agent: frontend
    branch: main
    depends_on:
      - sprint-01-repo-bootstrap
    status: completed

  # --- Sprint-02 Phase 0 (orchestration) ---
  - id: sprint-02-orchestration-activation
    sprint: 2
    phase: "0.2"
    module: orchestration
    agent: architect
    branch: agent/sprint-02-auth-tenant-iam
    status: completed
    outputs:
      - .cursor/rules/00-sprint-02-hard-guard.md
      - AGENTS.md
      - .ai/orchestration/task-queue.yaml
      - .ai/orchestration/locks.yaml
      - .ai/orchestration/sprint-02-handoff-order.md
      - .ai/orchestration/sprint-02-branch-plan.md

